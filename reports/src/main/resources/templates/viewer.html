<html>
<head>
    <meta charset="UTF-8">
    <title>Source viewer</title>
    <link rel="stylesheet" charset="UTF-8"
          href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/default.min.css">
    <script charset="UTF-8" type="application/javascript"
            src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlightjs-line-numbers.js@2.8.0/dist/highlightjs-line-numbers.min.js"></script>
    <!-- fflate + sokratesUnzip: decodes the whole data archive embedded inline below (no fetch). -->
    ${sokrates-unzip-lib}
    <style>
        body { font-family: 'DejaVu Sans', Arial, Helvetica, sans-serif; margin: 16px; }
        h3 { margin-bottom: 0; }
        .meta { color: #555; margin-top: 4px; }
        .block-label { color: #777; font-size: 12px; margin: 16px 0 2px 0; }
        .error { color: #b00; }
        pre { margin-top: 6px; }
        /* highlightjs-line-numbers.js gutter */
        .hljs-ln td { padding: 0; }
        .hljs-ln td.hljs-ln-numbers {
            text-align: right;
            color: #999;
            border-right: 1px solid #ddd;
            padding-right: 8px;
            vertical-align: top;
            -webkit-user-select: none;
            user-select: none;
        }
        /* table cells collapse leading whitespace by default; keep source indentation */
        .hljs-ln td.hljs-ln-code {
            padding-left: 10px;
            white-space: pre;
        }
        /* Loading indicator shown while the embedded archive is decoded + highlighted. */
        #loading {
            display: flex;
            align-items: center;
            gap: 12px;
            color: grey;
            font-size: 15px;
            padding: 40px 4px;
        }
        #loading .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #e0e0e0;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: sokrates-spin 0.8s linear infinite;
        }
        @keyframes sokrates-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="content"><div id="loading"><div class="spinner"></div><span>Loading source…</span></div></div>

<script>
    // The whole source viewer data archive, embedded inline as base64 by the generator
    // (var SOKRATES_ARCHIVE = "..."): source files keyed "<aspect>/<relativePath>" and fragment
    // bundles keyed "fragments/<type>.json". Extracted in-browser (no fetch) so this opens from
    // file://. Decoded lazily + memoized on first use.
    ${embedded-archive}
    var __archiveEntries = null;
    function archiveEntries() {
        if (!__archiveEntries) { __archiveEntries = sokratesUnzip(SOKRATES_ARCHIVE); }
        return __archiveEntries;
    }

    // Params are read from the URL FRAGMENT (e.g. #aspect=main&file=x&from=1&to=9 or
    // #bundle=fragments/longest_unit.json&i=3), not the query string: the fragment is not part of
    // the browser's HTTP cache key, so this one HTML file (which embeds the whole source archive) is
    // fetched once and reused for every file/fragment. Falls back to a legacy ?param= query string.
    function param(name) {
        var source = (window.location.hash && window.location.hash.length > 1)
            ? '&' + window.location.hash.substring(1)
            : window.location.search;
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(source);
        return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : null;
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function langClass(ext) {
        return ext ? (' class="' + escapeHtml(ext) + '"') : '';
    }

    // startFrom: the real source line number of the first rendered line (default 1).
    function renderCode(code, ext, startFrom) {
        var attr = (startFrom && startFrom > 1) ? (' data-start="' + startFrom + '"') : '';
        return '<pre><code' + langClass(ext) + attr + '>' + escapeHtml(code) + '</code></pre>';
    }

    function highlight() {
        document.querySelectorAll('pre code').forEach(function (el) {
            hljs.highlightElement(el);
            if (typeof hljs.lineNumbersBlock === 'function') {
                var start = parseInt(el.getAttribute('data-start'), 10);
                hljs.lineNumbersBlock(el, { startFrom: (start > 0 ? start : 1) });
            }
        });
    }

    function setHtml(html) {
        document.getElementById('content').innerHTML = html;
        highlight();
    }

    function showError(msg) {
        document.getElementById('content').innerHTML = '<p class="error">' + escapeHtml(msg) + '</p>';
    }

    function extFromPath(path) {
        var i = path.lastIndexOf('.');
        return i >= 0 ? path.substring(i + 1) : '';
    }

    // ?aspect=main&file=com/x/Foo.java[&from=&to=]  -> extract the "<aspect>/<file>" entry from the
    // embedded archive.
    function viewFile() {
        var aspect = param('aspect');
        var file = param('file');
        var from = parseInt(param('from'), 10);
        var to = parseInt(param('to'), 10);
        try {
            var bytes = archiveEntries()[aspect + '/' + file];
            if (!bytes) throw new Error('File not found in archive: ' + file);
            var text = fflate.strFromU8(bytes);
            var ext = extFromPath(file);
            var html = '<h3>' + escapeHtml(file) + '</h3>';
            if (!isNaN(from) && !isNaN(to)) {
                html += '<div class="meta">lines ' + from + ':' + to + '</div>';
            }
            html += renderCode(text, ext);
            setHtml(html);
            if (!isNaN(from)) scrollToLine(from);
        } catch (e) {
            showError(e.message);
        }
    }

    // ?bundle=fragments/longest_unit.json&i=3 -> render item 3 (1-based) of the bundle (extracted
    // from the embedded archive under the same "fragments/<type>.json" key).
    function viewBundle() {
        var bundle = param('bundle');
        var i = parseInt(param('i'), 10) - 1;
        try {
            var bytes = archiveEntries()[bundle];
            if (!bytes) throw new Error('Bundle not found: ' + bundle);
            var items = JSON.parse(fflate.strFromU8(bytes));
            if (!items || i < 0 || i >= items.length) throw new Error('Fragment ' + (i + 1) + ' not found in ' + bundle);
            var item = items[i];
            if (item.blocks) {
                renderDuplicate(item);
            } else {
                renderUnit(item);
            }
        } catch (e) {
            showError(e.message);
        }
    }

    function renderUnit(u) {
        var html = '<h3>' + escapeHtml(u.name || '') + '</h3>';
        html += '<div class="meta">in <i>' + escapeHtml(u.file || '') +
                ' [' + u.from + ':' + u.to + ']</i></div>';
        html += '<ul>';
        if (u.loc != null) html += '<li><b>' + u.loc + '</b> lines of code</li>';
        if (u.mccabe != null) html += '<li><b>' + u.mccabe + '</b> McCabe index (conditional complexity)</li>';
        html += '</ul>';
        html += renderCode(u.code || '', u.ext, u.from);
        setHtml(html);
    }

    function renderDuplicate(d) {
        var html = '<h3>Duplicated fragment</h3>';
        (d.blocks || []).forEach(function (b) {
            html += '<div class="block-label">' + escapeHtml(b.file || '') +
                    ' [' + b.from + ':' + b.to + ']</div>';
            html += renderCode(b.code || '', d.ext, b.from);
        });
        setHtml(html);
    }

    function scrollToLine(line) {
        // Best-effort: scroll proportionally within the rendered code block.
        var code = document.querySelector('pre code');
        if (!code) return;
        var lines = code.textContent.split('\n').length;
        if (lines > 0) {
            var y = code.getBoundingClientRect().height * (line / lines);
            window.scrollTo(0, Math.max(0, y - window.innerHeight / 3));
        }
    }

    function dispatch() {
        if (param('bundle')) {
            viewBundle();
        } else if (param('aspect') && param('file')) {
            viewFile();
        } else {
            showError('Nothing to show: expected ?aspect=&file= or ?bundle=&i=');
        }
    }

    (function main() {
        // Decoding the embedded archive + highlighting blocks the main thread; yield one frame
        // first so the loading spinner actually paints, then do the synchronous extract + render.
        requestAnimationFrame(function () { setTimeout(dispatch, 0); });
    })();
</script>
</body>
</html>
