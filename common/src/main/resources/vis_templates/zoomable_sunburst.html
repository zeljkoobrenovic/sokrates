<head>
    <style>
        body {
            font-family: Sans-serif;
            font-size: 11px;
        }

        .slice {
            cursor: pointer;
        }

        .slice .main-arc {
            stroke: #fff;
            stroke-width: 1px;
        }

        .slice .hidden-arc {
            fill: none;
        }

        .slice text {
            pointer-events: none;
            dominant-baseline: middle;
            text-anchor: middle;
        }

        .error { color: #b00; }

        /* Loading indicator shown while the view is extracted from the embedded archive. */
        #loading {
            display: flex;
            align-items: center;
            gap: 12px;
            color: grey;
            font-size: 15px;
            padding: 40px 4px;
        }

        #loading .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #e0e0e0;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: sokrates-spin 0.8s linear infinite;
        }

        @keyframes sokrates-spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script src='https://d3js.org/d3.v4.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Loading…</span></div>
<script>
    // Decodes the deflate+base64 JSON used for compressed inline data. fflate is loaded above.
    function sokratesInflate(b64) {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) { bytes[i] = bin.charCodeAt(i); }
        return JSON.parse(fflate.strFromU8(fflate.unzlibSync(bytes)));
    }

    // Decodes a whole zip archive embedded inline as base64 (the per-view archive). fflate above.
    function sokratesUnzip(b64) {
        var bin = atob(b64);
        var bytes = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) { bytes[i] = bin.charCodeAt(i); }
        return fflate.unzipSync(bytes);
    }

    // Optional inline data for self-contained pages (no archive); see zoomable_circles.html.
    ${sokrates-inline-data}

    // The per-view archive embedded as base64; generator fills `var SOKRATES_ARCHIVE = "<b64>";`.
    ${embedded-archive}
</script>
<script>

    // The per-view data is embedded inline as a base64 archive (one JSON entry per view, keyed by
    // the view name). The page selects its view via ?key=... and extracts only that entry from the
    // embedded bytes — no fetch, so it opens from file://.
    function param(name) {
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
        return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : null;
    }

    // The view key is in the URL fragment (#<key>) so the browser caches this one HTML file once and
    // reuses it for every view (the fragment is not part of the cache key). Legacy ?key= fallback.
    function viewKey() {
        var hash = window.location.hash;
        if (hash && hash.length > 1) {
            return decodeURIComponent(hash.substring(1));
        }
        return param('key');
    }

    // Hides the loading spinner; called once the data is ready (or on error).
    function hideSpinner() {
        var loading = document.getElementById('loading');
        if (loading) { loading.style.display = 'none'; }
    }

    function showError(msg) {
        hideSpinner();
        var p = document.createElement('p');
        p.className = 'error';
        p.textContent = msg;
        document.body.appendChild(p);
    }

    function render(children) {
        hideSpinner();
        const width = window.innerWidth,
            height = window.innerHeight,
            maxRadius = (Math.min(width, height) / 2) - 5;

        const formatNumber = d3.format(',d');

        const x = d3.scaleLinear()
            .range([0, 2 * Math.PI])
            .clamp(true);

        const y = d3.scaleSqrt()
            .range([maxRadius * .1, maxRadius]);

        const color = d3.scaleOrdinal(d3.schemeCategory20);

        const partition = d3.partition();

        const arc = d3.arc()
            .startAngle(d => x(d.x0))
            .endAngle(d => x(d.x1))
            .innerRadius(d => Math.max(0, y(d.y0)))
            .outerRadius(d => Math.max(0, y(d.y1)));

        const middleArcLine = d => {
            const halfPi = Math.PI / 2;
            const angles = [x(d.x0) - halfPi, x(d.x1) - halfPi];
            const r = Math.max(0, (y(d.y0) + y(d.y1)) / 2);

            const middleAngle = (angles[1] + angles[0]) / 2;
            const invertDirection = middleAngle > 0 && middleAngle < Math.PI; // On lower quadrants write text ccw
            if (invertDirection) {
                angles.reverse();
            }

            const path = d3.path();
            path.arc(0, 0, r, angles[0], angles[1], invertDirection);
            return path.toString();
        };

        const textFits = d => {
            const CHAR_SPACE = 6;

            const deltaAngle = x(d.x1) - x(d.x0);
            const r = Math.max(0, (y(d.y0) + y(d.y1)) / 2);
            const perimeter = r * deltaAngle;

            return d.data.name.length * CHAR_SPACE < perimeter;
        };

        const svg = d3.select('body').append('svg')
            .style('width', '100vw')
            .style('height', '100vh')
            .attr('viewBox', `${-width / 2} ${-height / 2} ${width} ${height}`)
            .on('click', () => focusOn()); // Reset zoom on canvas click

        var rootData = {
            "name": "",
            "children": children
        }


        root = d3.hierarchy(rootData);
        root.sum(d => d.size);

        const slice = svg.selectAll('g.slice')
            .data(partition(root).descendants());

        slice.exit().remove();

        const newSlice = slice.enter()
            .append('g').attr('class', 'slice')
            .on('click', d => {
                d3.event.stopPropagation();
                focusOn(d);
            });

        newSlice.append('title')
            .text(d => d.data.name + '\n' + formatNumber(d.value));

        newSlice.append('path')
            .attr('class', 'main-arc')
            .style('fill', d => color((d.children ? d : d.parent).data.name))
            .attr('d', arc);

        newSlice.append('path')
            .attr('class', 'hidden-arc')
            .attr('id', (_, i) => `hiddenArc${i}`)
            .attr('d', middleArcLine);

        const text = newSlice.append('text')
            .attr('display', d => textFits(d) ? null : 'none');

        // Add white contour
        text.append('textPath')
            .attr('startOffset', '50%')
            .attr('xlink:href', (_, i) => `#hiddenArc${i}`)
            .text(d => d.data.name)
            .style('fill', 'none')
            .style('stroke', '#fff')
            .style('stroke-width', 5)
            .style('stroke-linejoin', 'round');

        text.append('textPath')
            .attr('startOffset', '50%')
            .attr('xlink:href', (_, i) => `#hiddenArc${i}`)
            .text(d => d.data.name);

        function focusOn(d = {x0: 0, x1: 1, y0: 0, y1: 1}) {
            const transition = svg.transition()
                .duration(750)
                .tween('scale', () => {
                    const xd = d3.interpolate(x.domain(), [d.x0, d.x1]),
                        yd = d3.interpolate(y.domain(), [d.y0, 1]);
                    return t => {
                        x.domain(xd(t));
                        y.domain(yd(t));
                    };
                });

            transition.selectAll('path.main-arc')
                .attrTween('d', d => () => arc(d));

            transition.selectAll('path.hidden-arc')
                .attrTween('d', d => () => middleArcLine(d));

            transition.selectAll('text')
                .attrTween('display', d => () => textFits(d) ? null : 'none');

            moveStackToFront(d);

            //

            function moveStackToFront(elD) {
                svg.selectAll('.slice').filter(d => d === elD)
                    .each(function (d) {
                        this.parentNode.appendChild(this);
                        if (d.parent) {
                            moveStackToFront(d.parent);
                        }
                    })
            }
        }
    }

    var __sunburstEntriesCache = null;
    function loadEmbedded() {
        try {
            var key = viewKey() || 'main';
            if (!__sunburstEntriesCache) { __sunburstEntriesCache = sokratesUnzip(SOKRATES_ARCHIVE); }
            var bytes = __sunburstEntriesCache[key + '.json'];
            if (!bytes) throw new Error('View not found: ' + key);
            render(JSON.parse(fflate.strFromU8(bytes)));
        } catch (e) {
            showError(e.message);
        }
    }

    (function load() {
        // Inline mode (self-contained page) renders the embedded data directly. Otherwise the
        // per-view archive is embedded inline (SOKRATES_ARCHIVE); extract the ?key= view — no
        // fetch, so the page works from file://.
        if (typeof SOKRATES_INLINE_DATA !== 'undefined' && SOKRATES_INLINE_DATA !== null) {
            render(SOKRATES_INLINE_DATA);
            return;
        }
        // Decoding a large embedded archive blocks the main thread; yield one frame first so the
        // loading spinner actually paints, then do the synchronous extract + render.
        requestAnimationFrame(function () { setTimeout(loadEmbedded, 0); });
    })();
</script>
</body>
