<!DOCTYPE html>
<meta charset="utf-8">
<style>

    .node {
        cursor: pointer;
    }

    .node:hover {
        stroke: #000;
        stroke-width: 1.5px;
    }

    .node--leaf {
        fill: white;
    }

    .label {
        font: 11px "Helvetica Neue", Helvetica, Arial, sans-serif;
        text-anchor: middle;
        text-shadow: 0 1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff, 0 -1px 0 #fff;
    }

    /* Labels never intercept the mouse, so hovering anywhere over a circle reaches the circle's
       <title> tooltip. Leaf circles keep pointer-events so the tooltip works on them too. */
    .label {
        pointer-events: none;
    }

    .node--leaf {
        pointer-events: all;
    }

</style>
<svg width="960" height="960"></svg>
${sokrates-inflate-lib}
<script src="https://d3js.org/d3.v4.min.js"></script>
<script>

    var svg = d3.select("svg"),
        margin = 20,
        diameter = +svg.attr("width"),
        g = svg.append("g").attr("transform", "translate(" + diameter / 2 + "," + diameter / 2 + ")");

    var color = d3.scaleLinear()
        .domain([-1, 5])
        .range(["hsl(152,80%,100%)", "hsl(228,30%,40%)"])
        .interpolate(d3.interpolateHcl);


    var pack = d3.pack()
        .size([diameter - margin, diameter - margin])
        .padding(2);


    var root = {
        "name": "cluster",
        "children": ${data}
    }

    root = d3.hierarchy(root)
        .sum(function (d) {
            return d.size;
        })
        .sort(function (a, b) {
            return b.value - a.value;
        });

    // Inherit the nearest ancestor's explicit color so every node in a
    // colored sub-tree (e.g. a scope) shares the same hue, leaves included.
    function inheritedColor(d) {
        var node = d;
        while (node) {
            if (node.data && node.data.color) {
                return node.data.color;
            }
            node = node.parent;
        }
        return null;
    }

    var focus = root,
        nodes = pack(root).descendants(),
        view;

    var circle = g.selectAll("circle")
        .data(nodes)
        .enter().append("circle")
        .attr("class", function (d) {
            return d.parent ? d.children ? "node" : "node node--leaf" : "node node--root";
        })
        .style("fill", function (d) {
            var c = inheritedColor(d);
            if (c) {
                return c;
            }
            return d.children ? color(d.depth) : null;
        })
        .style("fill-opacity", function (d) {
            // Slightly fade parent containers so nested circles stay readable.
            return d.children ? 0.85 : 1;
        })
        .style("stroke", function (d) {
            // Thin outline on leaf circles so they stay crisp against folder
            // backgrounds (notably the white main-scope files).
            return d.children ? null : "#888";
        })
        .style("stroke-width", function (d) {
            return d.children ? null : 0.5;
        })
        .on("click", function (d) {
            if (focus !== d) zoom(d), d3.event.stopPropagation();
        });

    // Native hover tooltip on every circle: the producer's explicit tooltip (full name + size +
    // language) when present, else the name.
    circle.append("title").text(function (d) {
        return (d.data && d.data.tooltip) ? d.data.tooltip : d.data.name;
    });

    // Approx chars that fit inside a circle of (scaled) radius r at the label font size, so labels
    // are clipped to their bubble instead of overflowing into neighbours. ~6px per char at 11px font.
    function labelForRadius(name, r) {
        var maxChars = Math.floor((2 * r - 4) / 6);
        if (maxChars < 1) {
            return "";
        }
        if (name.length <= maxChars) {
            return name;
        }
        if (maxChars <= 1) {
            return name.substr(0, 1);
        }
        return name.substr(0, maxChars - 1) + "…";
    }

    var text = g.selectAll("text")
        .data(nodes)
        .enter().append("text")
        .attr("class", "label")
        .attr("dy", "0.35em")
        .style("fill-opacity", function (d) {
            return d.parent === root ? 1 : 0;
        })
        .style("display", function (d) {
            return d.parent === root ? "inline" : "none";
        });

    var node = g.selectAll("circle,text");

    svg
        .style("background", color(-1))
        .on("click", function () {
            zoom(root);
        });

    zoomTo([root.x, root.y, root.r * 2 + margin]);

    function zoom(d) {
        var focus0 = focus;
        focus = d;

        var transition = d3.transition()
            .duration(d3.event.altKey ? 7500 : 750)
            .tween("zoom", function (d) {
                var i = d3.interpolateZoom(view, [focus.x, focus.y, focus.r * 2 + margin]);
                return function (t) {
                    zoomTo(i(t));
                };
            });

        transition.selectAll("text")
            .filter(function (d) {
                return d.parent === focus || this.style.display === "inline";
            })
            .style("fill-opacity", function (d) {
                return d.parent === focus ? 1 : 0;
            })
            .on("start", function (d) {
                if (d.parent === focus) this.style.display = "inline";
            })
            .on("end", function (d) {
                if (d.parent !== focus) this.style.display = "none";
            });
    }

    function zoomTo(v) {
        var k = diameter / v[2];
        view = v;
        node.attr("transform", function (d) {
            return "translate(" + (d.x - v[0]) * k + "," + (d.y - v[1]) * k + ")";
        });
        circle.attr("r", function (d) {
            return d.r * k;
        });
        // Clip each label to fit its bubble at the current zoom; the full detail stays on hover
        // via the <title> tooltip.
        text.text(function (d) {
            return labelForRadius(d.data.name, d.r * k);
        });
    }

</script>
