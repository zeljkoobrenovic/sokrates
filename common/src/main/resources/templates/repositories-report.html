<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Repositories</title>
    <style type="text/css" media="all">
        body {
            font-family: Roboto, Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin-left: 0;
            margin-right: 0;
        }

        table {
            color: #333;
            border-collapse: collapse;
            border-spacing: 0;
        }

        td, th {
            border: 1px solid #CCC;
            height: 30px;
            padding-left: 10px;
            padding-right: 10px;
        }

        th {
            background: #F3F3F3;
            font-weight: bold;
        }

        td {
            background: #FFFFFF;
            text-align: left;
        }

        a {
            text-decoration: none;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        /* Classic Sokrates tab bar. */
        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            font-family: Roboto, Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            font-size: 100%;
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tab a.tab-link {
            float: left;
            padding: 14px 16px;
            color: #4a90d9;
        }

        .tabcontent {
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-top: none;
            overflow-y: auto;
        }

        /* Sortable header affordance layered on top of the original th style. */
        .sortable {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .sortable:hover {
            background: #e8e8e8;
        }

        .sort-active {
            background: #e2e2e2;
        }

        .sort-arrow {
            font-size: 80%;
            color: #555;
        }

        .tag-badge {
            margin: 2px;
            padding: 5px;
            display: inline-block;
            font-size: 70%;
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
</head>
<body>

<div style="color: grey; margin: 8px 0 10px 0;">
    <input id="filter" type="text" placeholder="search..."
           style="font-size: 16px; height: 30px; width: 320px;"
           onkeyup="render()">
    <span id="search-summary" style="display: inline-block; margin-left: 6px;"></span>
</div>

<div class="tab" id="tabs"></div>

<div class="tabcontent">
    <div id="content"></div>
</div>

<script>
    const repositories = ${data};
    const langIcons = ${langIcons};
    const features = ${features};
    const options = ${options};

    // ---- shared helpers ------------------------------------------------------

    function num(n) {
        return (n || 0).toLocaleString('en-US');
    }

    function esc(s) {
        return ('' + (s == null ? '' : s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // A single shared inline report icon (avoids per-row base64 bloat).
    const REPORT_ICON = '<svg width="26" height="26" viewBox="0 0 24 24" style="vertical-align: middle">'
        + '<rect x="4" y="2" width="16" height="20" rx="2" fill="none" stroke="#4a90d9" stroke-width="1.6"/>'
        + '<line x1="8" y1="7" x2="16" y2="7" stroke="#4a90d9" stroke-width="1.6"/>'
        + '<line x1="8" y1="11" x2="16" y2="11" stroke="#4a90d9" stroke-width="1.6"/>'
        + '<line x1="8" y1="15" x2="13" y2="15" stroke="#4a90d9" stroke-width="1.6"/></svg>';

    // Renders a round language badge (icon when known, else a text bubble),
    // matching the original report's 36px DataImageUtils.getLangDataImageDiv36 style.
    function langIcon(lang) {
        if (!lang) {
            return '';
        }
        const key = lang.toLowerCase();
        const size = 36;
        if (langIcons[key]) {
            return '<img title="' + esc(lang) + '" style="margin-right: 3px; vertical-align: top; background-color: #f1f1f1; '
                + 'border-radius: 50%; border: 1px solid lightgrey; width: ' + size + 'px; height: ' + size + 'px; object-fit: contain;" src="'
                + langIcons[key] + '">';
        }
        const fontSize = lang.length <= 3 ? 14 : 12;
        const padding = lang.length <= 3 ? 9 : 11;
        return '<div title="' + esc(lang) + '" style="margin-right: 3px; display: inline-block; vertical-align: top; '
            + 'background-color: #D6E4E1; border-radius: 50%; border: 1px solid grey; overflow: hidden; color: darkblue; '
            + 'width: ' + size + 'px; height: ' + size + 'px; '
            + 'font-size: ' + fontSize + 'px; font-weight: bold; text-align: center;">'
            + '<div style="height: ' + padding + 'px"></div>' + esc(lang) + '</div>';
    }

    function repoReportLink2(url) {
        return '<a href="' + esc(url) + '" target="_blank"><div style="height: 40px; display: flex; align-items: center; justify-content: center;">' + REPORT_ICON + '</div></a>';
    }

    function repoReportLink(item) {
        return repoReportLink2((item.reportFolderUrl || '') + 'index.html');
    }

    // Repository display name: parent path greyed, last segment emphasised.
    function repoNameHtml(item) {
        const name = item.metadata && item.metadata.name ? item.metadata.name : '';
        const url = (item.reportFolderUrl || '') + 'index.html';
        const clip = 'overflow: hidden; white-space: nowrap; text-overflow: ellipsis;';
        let inner;
        if (name.indexOf('/') >= 0) {
            const i = name.indexOf('/');
            inner = '<div style="font-size: 90%; color: grey; ' + clip + '">' + esc(name.substring(0, i)) + '</div>'
                + '<div style="' + clip + '">' + esc(name.substring(i + 1)) + '</div>';
        } else {
            inner = '<div style="' + clip + '">' + esc(name) + '</div>';
        }
        return '<a href="' + esc(url) + '" target="_blank" style="color: #333">' + inner + '</a>';
    }

    function ageText(item) {
        return item.ageYears > 0 ? item.ageYears + 'y' : (item.ageInDays > 0 ? '<1y' : '-');
    }

    function tagsHtml(item) {
        if (!item.tags || !item.tags.length) {
            return '';
        }
        return item.tags.map(t => '<span class="tag-badge" style="background-color: ' + esc(t.color) + '">'
            + esc(t.tag) + '</span>').join('');
    }

    // Number of bars (slots) drawn per chart, fixed per chart type so the column
    // can be sized to the bar strip width.
    const WEEK_SLOTS = 52;
    const YEAR_SLOTS = options.historyYears || 20;
    const BAR_WIDTH = 10;

    // Mini bar chart from a history block (commits or contributors). Bars are ordered
    // chronologically by slot label so the oldest is on the left and the newest on the
    // right, regardless of how the slots are stored. The strip is a fixed-width container
    // (slotCount * BAR_WIDTH) so every row's chart occupies exactly the column width.
    function miniBars(history, field, color, slotCount) {
        const stripWidth = slotCount * BAR_WIDTH;
        let html = '<div style="white-space: nowrap; width: ' + stripWidth + 'px; overflow: hidden;">';
        if (history && history.slots && history.slots.length) {
            const values = history[field] || [];
            const bars = history.slots.map((slot, i) => ({slot: slot, v: values[i] || 0}));
            bars.sort((a, b) => String(a.slot).localeCompare(String(b.slot)));
            let max = 1;
            bars.forEach(b => max = Math.max(max, b.v));
            bars.forEach(b => {
                const h = Math.round(2 + 24 * b.v / max);
                html += '<div title="' + b.v + ' in ' + esc(b.slot) + '" style="margin: 0; padding: 0; '
                    + 'display: inline-block; vertical-align: bottom; width: ' + BAR_WIDTH + 'px; opacity: 0.5; '
                    + 'background-color: ' + (b.v === 0 ? '#cccccc' : color) + '; height: ' + h + 'px;"></div>';
            });
        }
        html += '</div>';
        return html;
    }

    // Fixed-width column for a mini bar chart, sized to the bar strip.
    function barColumn(key, label, historyField, valueField, color, slotCount) {
        const w = slotCount * BAR_WIDTH;
        const style = 'text-align: left; width: ' + w + 'px; min-width: ' + w + 'px; max-width: ' + w + 'px;';
        return {
            key: key, label: label, type: 'number', dir: -1, sortable: false, headerStyle: style,
            value: i => 0,
            cell: i => '<td style="' + style + '">' + miniBars(i[historyField], valueField, color, slotCount) + '</td>'
        };
    }

    // % of files in the high + very-high risk bands (used to sort risk columns).
    function riskHighPct(bands) {
        if (!bands) {
            return 0;
        }
        const total = bands.negligible + bands.low + bands.medium + bands.high + bands.veryHigh;
        return total > 0 ? 100 * (bands.high + bands.veryHigh) / total : 0;
    }

    const RISK_PALETTE = ['#6caf43', '#9DC034', '#f1c40f', '#e67e22', '#c0392b']; // neg,low,med,high,veryHigh
    const AGE_PALETTE = ['#c0392b', '#e67e22', '#f1c40f', '#9DC034', '#6caf43'];  // older->newer (newness)
    const FRESH_PALETTE = ['#c0392b', '#e67e22', '#f1c40f', '#9DC034', '#6caf43']; // stale(neg) -> fresh(veryHigh)

    function riskBar(bands, palette) {
        if (!bands) {
            return '<span style="color: grey; font-size: 70%">-</span>';
        }
        const order = ['negligible', 'low', 'medium', 'high', 'veryHigh'];
        const total = order.reduce((a, k) => a + (bands[k] || 0), 0);
        if (total === 0) {
            return '<span style="color: grey; font-size: 70%">-</span>';
        }
        let html = '<div style="display: inline-block; width: 100px; height: 12px; white-space: nowrap; border: 1px solid #eee;" '
            + 'title="' + order.map((k, i) => k + ': ' + num(bands[k])).join('\n') + '">';
        order.forEach((k, i) => {
            const w = 100 * (bands[k] || 0) / total;
            if (w > 0) {
                html += '<div style="display: inline-block; height: 12px; vertical-align: top; width: ' + w + '%; background-color: ' + palette[i] + ';"></div>';
            }
        });
        html += '</div>';
        return html;
    }

    function duplicationBar(metrics) {
        if (!metrics || metrics.skipDuplication) {
            return '<span style="color: grey; font-size: 70%">not measured</span>';
        }
        const pct = metrics.duplicationPercentage || 0;
        const w = Math.min(100, Math.round(pct));
        return '<div title="' + pct.toFixed(1) + '% duplication" style="position: relative; display: inline-block; width: 100px; height: 12px; background-color: #9DC034; border: 1px solid #eee; vertical-align: middle;">'
            + '<div style="position: absolute; left: 0; top: 0; height: 12px; width: ' + w + '%; background-color: crimson;"></div></div>'
            + '<span style="font-size: 70%; margin-left: 4px;">' + pct.toFixed(1) + '%</span>';
    }

    function controlsHtml(metrics) {
        if (!metrics || !metrics.controls || !metrics.controls.length) {
            return '';
        }
        return metrics.controls.map(c => {
            const color = c.status === 'OK' ? '#6caf43' : (c.status === 'FAILED' ? '#c0392b' : '#f1c40f');
            return '<span title="' + esc(c.description) + '" style="display: inline-block; border-radius: 50%; height: 12px; width: 12px; margin: 1px; background-color: ' + color + ';"></span>';
        }).join('');
    }

    // ---- sorting -------------------------------------------------------------

    function makeComparator(column, dir) {
        return (a, b) => {
            const va = column.value(a);
            const vb = column.value(b);
            let cmp;
            if (column.type === 'string') {
                cmp = String(va == null ? '' : va).localeCompare(String(vb == null ? '' : vb));
            } else {
                cmp = (va < vb) ? -1 : (va > vb ? 1 : 0);
            }
            return cmp * dir;
        };
    }

    function sortHeader(tab, column) {
        const active = tab.sortKey === column.key;
        const arrow = active ? (tab.sortDir === 1 ? ' ▲' : ' ▼') : '';
        const cls = 'sortable' + (active ? ' sort-active' : '');
        const style = column.headerStyle || '';
        return '<th class="' + cls + '" style="' + style + '" onclick="sortBy(\'' + tab.id + '\', \'' + column.key + '\')">'
            + column.label + '<span class="sort-arrow">' + arrow + '</span></th>';
    }

    function sortBy(tabId, key) {
        const tab = TABS_BY_ID[tabId];
        const column = tab.columns.find(c => c.key === key);
        if (!column) {
            return;
        }
        if (tab.sortKey === key) {
            tab.sortDir = -tab.sortDir;
        } else {
            tab.sortKey = key;
            tab.sortDir = column.dir;
        }
        render();
    }

    // ---- column definitions per tab -----------------------------------------

    function locColumn(key, label, accessor, color) {
        return {
            key: key, label: label, type: 'number', dir: -1,
            headerStyle: 'text-align: center;',
            value: accessor,
            cell: item => '<td style="text-align: center; font-size: 90%;' + (color ? ' color:' + color + ';' : '') + '">'
                + num(accessor(item)) + '</td>'
        };
    }

    // Fixed-width first column sized to the 36px language icon (+ padding).
    const LANG_COL_STYLE = 'width: 44px; min-width: 44px; max-width: 44px; padding-left: 4px; padding-right: 4px; text-align: center;';
    const langCol = {
        key: 'lang', label: '', type: 'string', dir: 1, headerStyle: LANG_COL_STYLE,
        value: item => (item.mainLang || '').toLowerCase(),
        cell: item => '<td style="' + LANG_COL_STYLE + '"><div style="white-space: nowrap; overflow: hidden">' + langIcon(item.mainLang) + '</div></td>'
    };
    // Fixed-width repository column: never wraps, overflow hidden.
    const NAME_COL_STYLE = 'width: 400px; min-width: 400px; max-width: 400px; overflow: hidden; white-space: nowrap;';
    const nameCol = {
        key: 'name', label: 'Repository', type: 'string', dir: 1, headerStyle: 'text-align: left; ' + NAME_COL_STYLE,
        value: item => (item.metadata && item.metadata.name ? item.metadata.name : '').toLowerCase(),
        cell: item => '<td style="vertical-align: middle; ' + NAME_COL_STYLE + '">' + repoNameHtml(item) + '</td>'
    };
    const reportCol = {
        key: 'report', label: 'Report', type: 'string', dir: 1, headerStyle: 'text-align: center;',
        value: item => '', sortable: false,
        cell: item => '<td style="text-align: center;">' + repoReportLink(item) + '</td>'
    };

    function riskColumn(key, label, metricKey, palette) {
        return {
            key: key, label: label, type: 'number', dir: -1, headerStyle: 'text-align: center;',
            value: item => riskHighPct(item.repositoryMetrics ? item.repositoryMetrics[metricKey] : null),
            cell: item => '<td style="text-align: center;">' + riskBar(item.repositoryMetrics ? item.repositoryMetrics[metricKey] : null, palette) + '</td>'
        };
    }

    const TABS = [];

    // Contributor count cell with the list of emails as a tooltip (as in the explorer).
    function contributorsCell(list, dim) {
        const people = list || [];
        return '<td style="text-align: center; font-size: 90%; cursor: help;' + (dim ? ' color: #b0b0b0;' : '') + '" title="'
            + esc(people.join('\n')) + '">' + num(people.length) + '</td>';
    }

    // Overview: same columns as the former repositories explorer, plus a Report link.
    (function () {
        const cols = [
            langCol, nameCol,
            locColumn('mainLoc', 'main', i => i.mainLinesOfCode),
            locColumn('testLoc', 'test', i => i.testLinesOfCode, '#b0b0b0'),
            locColumn('otherLoc', 'other', i => i.generatedLinesOfCode + i.buildAndDeployLinesOfCode + i.otherLinesOfCode, '#b0b0b0'),
            {key: 'latest', label: 'last<br>commit', type: 'string', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.latestCommitDate || '', cell: i => '<td style="text-align: center; font-size: 90%; white-space: nowrap;">' + esc(i.latestCommitDate) + '</td>'},
            {key: 'commits30', label: 'commits<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount30Days, cell: i => '<td style="text-align: center; font-size: 90%;">' + num(i.commitsCount30Days) + '</td>'},
            {key: 'commits90', label: 'commits<br>(90d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount90Days, cell: i => '<td style="text-align: center; font-size: 90%; color: #b0b0b0;">' + num(i.commitsCount90Days) + '</td>'},
            {key: 'commitsAll', label: 'commits<br>(all time)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount, cell: i => '<td style="text-align: center; font-size: 90%; color: #b0b0b0;">' + num(i.commitsCount) + '</td>'},
            {key: 'contributors30', label: 'contributors<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => (i.contributors30Days || []).length, cell: i => contributorsCell(i.contributors30Days, false)},
            {key: 'contributors90', label: 'contributors<br>(90d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => (i.contributors90Days || []).length, cell: i => contributorsCell(i.contributors90Days, true)},
            {key: 'contributorsAll', label: 'contributors<br>(all time)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => (i.contributors || []).length, cell: i => contributorsCell(i.contributors, true)},
            reportCol
        ];
        TABS.push({
            id: 'repositories', label: 'Overview', columns: cols, sortKey: 'commits30', sortDir: -1,
            // Grouped top header row (LOC / Activity / Contributors), mirroring the explorer.
            groupHeader: [
                {span: 2},                              // lang + repository
                {label: 'LOC', span: 3},                // main / test / other
                {label: 'Activity', span: 4},           // last commit + commits 30d/90d/all
                {label: 'Contributors', span: 3},       // 30d / 90d / all
                {span: 1}                               // report
            ]
        });
    })();

    // Commits Trend
    TABS.push({
        id: 'commitsTrend', label: 'Commits Trend', sortKey: 'commits30', sortDir: -1,
        columns: [
            langCol, nameCol,
            {key: 'commits30', label: 'Commits<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount30Days, cell: i => '<td style="text-align: center;">' + num(i.commitsCount30Days) + '</td>'},
            {key: 'contrib30', label: 'Contributors<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.recentContributorsCount, cell: i => '<td style="text-align: center;">' + num(i.recentContributorsCount) + '</td>'},
            {key: 'rookies30', label: 'Rookies<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.rookiesCount, cell: i => '<td style="text-align: center;">' + num(i.rookiesCount) + '</td>'},
            barColumn('perWeek', 'Commits per Week (past year)', 'weeks', 'commits', 'blue', WEEK_SLOTS),
            reportCol
        ]
    });

    // Contributors Trend
    TABS.push({
        id: 'contributorsTrend', label: 'Contributors Trend', sortKey: 'contrib30', sortDir: -1,
        columns: [
            langCol, nameCol,
            {key: 'commits30', label: 'Commits<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount30Days, cell: i => '<td style="text-align: center;">' + num(i.commitsCount30Days) + '</td>'},
            {key: 'contrib30', label: 'Contributors<br>(30d)*', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.recentContributorsCount, cell: i => '<td style="text-align: center;">' + num(i.recentContributorsCount) + '</td>'},
            {key: 'rookies30', label: 'Rookies<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.rookiesCount, cell: i => '<td style="text-align: center;">' + num(i.rookiesCount) + '</td>'},
            barColumn('perWeek', 'Contributors per Week (past year)', 'weeks', 'contributors', 'darkred', WEEK_SLOTS),
            reportCol
        ]
    });

    // History
    function historyColumns() {
        return [
            langCol, nameCol,
            {key: 'age', label: 'Age', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.ageInDays, cell: i => '<td style="text-align: center; font-size: 90%;">' + ageText(i) + '</td>'},
            {key: 'latest', label: 'Last<br>Commit', type: 'string', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.latestCommitDate || '', cell: i => '<td style="text-align: center; font-size: 90%; white-space: nowrap;">' + esc(i.latestCommitDate) + '</td>'},
            {key: 'commits30', label: 'Commits<br>(30d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount30Days, cell: i => '<td style="text-align: center; font-size: 90%;">' + num(i.commitsCount30Days) + '</td>'},
            {key: 'commits90', label: 'Commits<br>(90d)', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount90Days, cell: i => '<td style="text-align: center; font-size: 90%; color: #b0b0b0;">' + num(i.commitsCount90Days) + '</td>'},
            barColumn('perYear', 'Commits per Year', 'years', 'commits', '#4a90d9', YEAR_SLOTS),
            {key: 'contrib', label: 'Contributors', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => (i.contributors || []).length, cell: i => '<td style="text-align: center; font-size: 90%;">' + num((i.contributors || []).length) + '</td>'},
            {key: 'commits', label: 'Commits', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => i.commitsCount, cell: i => '<td style="text-align: center; font-size: 90%;">' + num(i.commitsCount) + '</td>'},
            {key: 'freshness', label: 'Freshness', type: 'number', dir: -1, headerStyle: 'text-align: center;',
                value: i => riskHighPct(i.repositoryMetrics ? i.repositoryMetrics.freshness : null),
                cell: i => '<td style="text-align: center;">' + riskBar(i.repositoryMetrics ? i.repositoryMetrics.freshness : null, FRESH_PALETTE) + '</td>'},
            reportCol
        ];
    }
    TABS.push({id: 'history', label: 'History', columns: historyColumns(), sortKey: 'age', sortDir: -1});
    TABS.push({id: 'newest', label: 'Creation', columns: historyColumns(), sortKey: 'age', sortDir: 1});

    // Metrics
    (function () {
        const cols = [
            langCol,
            {key: 'name', label: 'Repository', type: 'string', dir: 1, headerStyle: 'text-align: left; ' + NAME_COL_STYLE,
                value: i => (i.metadata && i.metadata.name ? i.metadata.name : '').toLowerCase(),
                cell: i => '<td style="vertical-align: middle; ' + NAME_COL_STYLE + '">' + repoNameHtml(i)
                    + '<div style="color: black; font-size: 80%"><b>' + num(i.mainLinesOfCode) + '</b> LOC (main)'
                    + (i.commitsCount90Days > 0 ? ', <b>' + num(i.commitsCount90Days) + '</b> commits (90d)' : '') + '</div></td>'},
            {key: 'duplication', label: 'Duplication', type: 'number', dir: -1, headerStyle: 'text-align: left;',
                value: i => i.repositoryMetrics ? i.repositoryMetrics.duplicationPercentage : 0,
                cell: i => '<td style="text-align: left; white-space: nowrap;">' + duplicationBar(i.repositoryMetrics) + '</td>'},
            riskColumn('fileSize', 'File Size', 'fileSize', RISK_PALETTE),
            riskColumn('unitSize', 'Unit Size', 'unitSize', RISK_PALETTE),
            riskColumn('complexity', 'Conditional<br>Complexity', 'conditionalComplexity', RISK_PALETTE),
            riskColumn('newness', 'Newness', 'newness', AGE_PALETTE),
            riskColumn('freshness', 'Freshness', 'freshness', FRESH_PALETTE),
            riskColumn('updateFreq', 'Update<br>Frequency', 'updateFrequency', RISK_PALETTE)
        ];
        if (options.showControls) {
            cols.push({key: 'controls', label: 'Controls', type: 'string', dir: 1, headerStyle: 'text-align: center;', sortable: false,
                value: i => '', cell: i => '<td style="text-align: center;">' + controlsHtml(i.repositoryMetrics) + '</td>'});
        }
        cols.push(reportCol);
        // Metrics tab only lists repositories with main code.
        TABS.push({id: 'metrics', label: 'Metrics', columns: cols, sortKey: 'name', sortDir: 1,
            filter: i => i.mainLinesOfCode > 0});
    })();

    const TABS_BY_ID = {};
    TABS.forEach(t => TABS_BY_ID[t.id] = t);

    // Features of Interest is rendered specially (not the generic table machinery).
    const HAS_FEATURES = features && features.concerns && features.concerns.length > 0;

    let activeTab = 'repositories';

    // ---- rendering -----------------------------------------------------------

    function buildTabs() {
        let html = '';
        TABS.forEach(tab => {
            if (tab.id === 'commitsTrend' || tab.id === 'contributorsTrend' || tab.id === 'history' || tab.id === 'newest') {
                if (!options.showCommits) {
                    return;
                }
            }
            html += '<button class="' + (tab.id === activeTab ? 'active' : '') + '" onclick="selectTab(\'' + tab.id + '\')">' + tab.label + '</button>';
        });
        if (HAS_FEATURES) {
            html += '<button class="' + ('features' === activeTab ? 'active' : '') + '" onclick="selectTab(\'features\')">Features of Interest</button>';
        }
        html += '<a class="tab-link" href="files-explorer.html" target="_blank">Files...</a>';
        document.getElementById('tabs').innerHTML = html;
    }

    function selectTab(id) {
        activeTab = id;
        buildTabs();
        render();
    }

    function getFilters() {
        return document.getElementById('filter').value.toLowerCase().trim()
            .split(',').map(s => s.trim()).filter(s => s.length);
    }

    function matchesFilters(name, filters) {
        if (!filters.length) {
            return true;
        }
        if (!name) {
            return false;
        }
        const lower = name.toLowerCase();
        return filters.some(f => lower.includes(f));
    }

    function render() {
        const filters = getFilters();

        if (activeTab === 'features') {
            renderFeatures(filters);
            return;
        }

        const tab = TABS_BY_ID[activeTab];
        let rows = repositories.filter(item => matchesFilters(item.metadata && item.metadata.name, filters));
        if (tab.filter) {
            rows = rows.filter(tab.filter);
        }
        const column = tab.columns.find(c => c.key === tab.sortKey) || tab.columns[0];
        rows = rows.slice().sort(makeComparator(column, tab.sortDir));

        const filteredMainLoc = rows.reduce((a, b) => a + (b.mainLinesOfCode || 0), 0);
        const filteredCommits = rows.reduce((a, b) => a + (b.commitsCount || 0), 0);
        document.getElementById('search-summary').innerHTML = '= ' + rows.length + ' '
            + (rows.length === 1 ? 'repository' : 'repositories')
            + ' (' + num(filteredMainLoc) + ' LOC main, ' + num(filteredCommits) + ' commits)';

        let html = proportionBars(rows.length, filteredMainLoc, filteredCommits);
        html += '<table style="width: 100%"><thead>';
        if (tab.groupHeader) {
            html += '<tr>';
            tab.groupHeader.forEach(g => {
                const style = g.label
                    ? 'text-align: center; border-bottom: 2px solid lightgrey;'
                    : '';
                html += '<th colspan="' + g.span + '" style="' + style + '">' + (g.label || '') + '</th>';
            });
            html += '</tr>';
        }
        html += '<tr>';
        tab.columns.forEach(col => {
            if (col.sortable === false) {
                html += '<th style="' + (col.headerStyle || '') + '">' + col.label + '</th>';
            } else {
                html += sortHeader(tab, col);
            }
        });
        html += '</tr></thead><tbody>';
        rows.forEach(item => {
            html += '<tr style="white-space: nowrap;' + recencyColor(item) + '">';
            tab.columns.forEach(col => html += col.cell(item));
            html += '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('content').innerHTML = html;
    }

    // Row text fades with commit recency, matching the original report.
    function recencyColor(item) {
        if (item.commitsCount90Days > 0) {
            return '';
        }
        return item.commitsCount180Days > 0 ? 'color:#b0b0b0' : 'color:#c3c3c3';
    }

    // Totals across all repositories, used to size the proportion bars.
    const TOTAL_COUNT = repositories.length;
    const TOTAL_MAIN_LOC = repositories.reduce((a, b) => a + (b.mainLinesOfCode || 0), 0);
    const TOTAL_COMMITS = repositories.reduce((a, b) => a + (b.commitsCount || 0), 0);

    // Three proportion bars (% of repositories / LOC / commits) shown above the table
    // when the current view is a strict subset, mirroring the old repositories explorer.
    function proportionBars(count, mainLoc, commits) {
        if (mainLoc >= TOTAL_MAIN_LOC) {
            return '';
        }
        function bar(part, whole, color, label) {
            const w1 = whole > 0 ? Math.round(100 * part / whole) : 0;
            const w2 = 100 - w1;
            const shown = (part === 0 || w1 > 0) ? w1 : '<1';
            return '<div style="width: 400px; margin: 0; padding: 0; white-space: nowrap">'
                + '<div style="margin: 0; display: inline-block; width: ' + w1 + '%; background-color: ' + color + '; height: 12px"></div>'
                + '<div style="margin: 0; display: inline-block; width: ' + w2 + '%; background-color: #c0c0c0; height: 12px"></div>'
                + '<div style="margin: 0; display: inline-block; font-size: 80%; width: 140px; color: grey; vertical-align: top">&nbsp;' + shown + '% ' + label + '</div>'
                + '</div>';
        }
        return '<div style="margin-bottom: 10px;">'
            + bar(count, TOTAL_COUNT, '#303030', 'of repositories')
            + bar(mainLoc, TOTAL_MAIN_LOC, 'skyblue', 'of LOC')
            + bar(commits, TOTAL_COMMITS, 'green', 'of commits')
            + '</div>';
    }

    function renderFeatures(filters) {
        const concerns = features.concerns;
        let repos = features.repositories.filter(r => matchesFilters(r.name, filters));

        document.getElementById('search-summary').innerHTML = '= ' + repos.length + ' '
            + (repos.length === 1 ? 'repository' : 'repositories');

        let html = '<table style="width: 100%"><thead>';
        html += '<tr><th style="border: none; ' + LANG_COL_STYLE + '"></th><th style="border: none"></th>';
        concerns.forEach(c => {
            html += '<th colspan="2" style="text-align: center">' + esc(c.name) + ' (' + c.count + ')</th>';
        });
        html += '<th style="border: none"></th></tr>';
        html += '<tr><th style="border-left: none; border-top: none; ' + LANG_COL_STYLE + '"></th><th style="text-align: left">Repositories (' + features.repositories.length + ')</th>';
        concerns.forEach(() => {
            html += '<th style="font-size: 70%; text-align: center">matches</th><th style="font-size: 70%; text-align: center">files</th>';
        });
        html += '<th style="font-size: 70%">Details</th></tr></thead><tbody>';

        repos.forEach(r => {
            html += '<tr style="white-space: nowrap">';
            html += '<td style="' + LANG_COL_STYLE + '"><div style="white-space: nowrap; overflow: hidden">' + langIcon(r.mainLang) + '</div></td>';
            const featuresUrl = (r.reportFolderUrl || '') + 'FeaturesOfInterest.html';
            html += '<td><a href="' + esc(featuresUrl) + '" target="_blank" style="color:#333">' + esc(r.name) + '</a></td>';
            concerns.forEach(c => {
                const cell = r.perConcern && r.perConcern[c.name] ? r.perConcern[c.name] : null;
                html += '<td style="text-align: center">' + (cell && cell.matches > 0 ? num(cell.matches) : '-') + '</td>';
                html += '<td style="text-align: center">' + (cell && cell.files > 0 ? num(cell.files) : '-') + '</td>';
            });
            html += '<td style="text-align: center">' + repoReportLink2(featuresUrl) + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('content').innerHTML = html;
    }

    buildTabs();
    render();
</script>
</body>
</html>
