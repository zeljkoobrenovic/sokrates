<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contributors</title>
    <style type="text/css" media="all">
        body {
            font-family: Roboto, Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            margin-left: 0;
            margin-right: 0;
        }

        table {
            color: #333;
            border-collapse: collapse;
            border-spacing: 0;
        }

        td, th {
            border: 1px solid #CCC;
            height: 30px;
            padding-left: 10px;
            padding-right: 10px;
        }

        th {
            background: #F3F3F3;
            font-weight: bold;
        }

        td {
            background: #FFFFFF;
            text-align: left;
        }

        a {
            text-decoration: none;
        }

        ::placeholder {
            color: lightgrey;
            opacity: 1;
        }

        /* Classic Sokrates tab bar. */
        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            font-family: Roboto, Vollkorn, Ubuntu, Optima, Segoe, Segoe UI, Candara, Calibri, Arial, sans-serif;
            font-size: 100%;
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
        }

        .tab button:hover {
            background-color: #ddd;
        }

        .tab button.active {
            background-color: #ccc;
        }

        .tab a.tab-link {
            float: left;
            padding: 14px 16px;
            color: #4a90d9;
        }

        .tabcontent {
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-top: none;
            overflow-y: auto;
        }

        .sortable {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .sortable:hover {
            background: #e8e8e8;
        }

        .sort-active {
            background: #e2e2e2;
        }

        .sort-arrow {
            font-size: 80%;
            color: #555;
        }

        .tag-badge {
            vertical-align: top;
            font-size: 60%;
            background-color: skyblue;
            border-radius: 7px;
            display: inline-block;
            padding: 3px 4px 5px 4px;
            margin: 3px;
        }

        .team-badge {
            vertical-align: top;
            font-size: 60%;
            background-color: lightyellow;
            border-radius: 12px;
            display: inline-block;
            padding: 3px 6px;
            margin: 3px;
            color: black;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
    ${sokrates-inflate-lib}
</head>
<body>

<div class="tab" id="tabs"></div>

<div class="tabcontent">
    <div style="color: grey; margin: 8px 0 10px 0;">
        <input id="filter" type="text" placeholder="search by name... (use team: to search by team, ; for multiple terms)"
               style="font-size: 16px; height: 30px; width: 320px;"
               onkeyup="render()">
        <span id="search-summary" style="display: inline-block; margin-left: 6px;"></span>
    </div>
    <div id="content"></div>
</div>

<script>
    // Per-scope contributor lists, language-icon map, and options, embedded as JSON.
    const groups = ${data};        // { recent: [...], all: [...], bots: [...] }
    const langIcons = ${langIcons};
    const options = ${options};    // { showBots, avatarTeam, avatarDeveloper }

    function num(n) {
        return (n || 0).toLocaleString('en-US');
    }

    function esc(s) {
        return ('' + (s == null ? '' : s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function pct(part, whole) {
        return whole > 0 ? (100 * part / whole).toFixed(1) : '0.0';
    }

    const DETAILS_ICON = '<svg width="20" height="20" viewBox="0 0 24 24" style="vertical-align: middle">'
        + '<circle cx="12" cy="12" r="9" fill="none" stroke="#4a90d9" stroke-width="1.6"/>'
        + '<line x1="12" y1="11" x2="12" y2="16" stroke="#4a90d9" stroke-width="1.8"/>'
        + '<circle cx="12" cy="8" r="1.2" fill="#4a90d9"/></svg>';

    // Round language badge (icon when known, else a text bubble) — 30px to match the original.
    function langIcon(lang) {
        if (!lang) {
            return '';
        }
        const key = lang.toLowerCase();
        const size = 30;
        if (langIcons[key]) {
            return '<img title="' + esc(lang) + '" style="vertical-align: middle; background-color: #f1f1f1; '
                + 'border-radius: 50%; border: 1px solid lightgrey; width: ' + size + 'px; height: ' + size + 'px; object-fit: contain;" src="'
                + langIcons[key] + '">';
        }
        const fontSize = lang.length <= 3 ? 11 : 9;
        const padding = lang.length <= 3 ? 7 : 9;
        return '<div title="' + esc(lang) + '" style="display: inline-block; vertical-align: middle; '
            + 'background-color: #D6E4E1; border-radius: 50%; border: 1px solid grey; overflow: hidden; color: darkblue; '
            + 'width: ' + size + 'px; height: ' + size + 'px; '
            + 'font-size: ' + fontSize + 'px; font-weight: bold; text-align: center;">'
            + '<div style="height: ' + padding + 'px"></div>' + esc(lang) + '</div>';
    }

    function avatarHtml(c) {
        const fallback = c.membersCount > 0 ? options.avatarTeam : options.avatarDeveloper;
        const src = c.avatarUrl || fallback;
        return '<div style="vertical-align: middle; display: inline-block; width: 48px; margin-top: 2px;">'
            + '<img style="border-radius: 50%; height: 38px; width: 38px; margin-right: 10px;" src="' + esc(src) + '" '
            + 'onerror="this.onerror=null;this.src=\'' + esc(fallback) + '\';"></div>';
    }

    function nameCell(c) {
        const color = c.commitsCount90Days > 0 ? '#333' : 'lightgrey';
        let body = avatarHtml(c) + esc(c.email);
        if (c.membersCount > 0) {
            body += ' (' + num(c.membersCount) + ')';
        }
        (c.tags || []).forEach(t => body += '<span class="tag-badge">' + esc(t) + '</span>');
        if (c.team) {
            body = '<div><div class="team-badge">' + esc(c.team) + '</div>'
                + '<div style="margin-top: -15px; margin-bottom: -9px;">' + body + '</div></div>';
        }
        return '<td style="vertical-align: middle; white-space: nowrap; overflow: hidden;">'
            + '<a target="_blank" style="color: ' + color + ';" href="' + esc(c.reportUrl) + '">' + body + '</a></td>';
    }

    function commitsCell(value, total, withPct, dim) {
        let text = num(value);
        if (withPct) {
            text += ' (' + pct(value, total) + '%)';
        }
        return '<td style="vertical-align: middle; text-align: center; font-size: 90%;' + (dim ? ' color: #b0b0b0;' : '') + '">' + text + '</td>';
    }

    const langCol = {
        key: 'lang', label: '', type: 'string', dir: 1, headerStyle: 'text-align: center; width: 32px; max-width: 32px;',
        value: c => (c.mainLang || '').toLowerCase(),
        cell: c => '<td style="text-align: center; width: 32px; max-width: 32px;">' + langIcon(c.mainLang) + '</td>'
    };
    const nameCol = {
        key: 'name', label: 'contributor', type: 'string', dir: 1, headerStyle: 'text-align: left;',
        value: c => (c.email || '').toLowerCase(),
        cell: c => nameCell(c)
    };
    const firstCol = {
        key: 'first', label: 'first', type: 'string', dir: 1, headerStyle: 'text-align: center;',
        value: c => c.firstCommitDate || '',
        cell: c => '<td style="vertical-align: middle; text-align: center; white-space: nowrap; font-size: 90%;">' + esc(c.firstCommitDate) + '</td>'
    };
    const latestCol = {
        key: 'latest', label: 'latest', type: 'string', dir: -1, headerStyle: 'text-align: center;',
        value: c => c.latestCommitDate || '',
        cell: c => '<td style="vertical-align: middle; text-align: center; white-space: nowrap; font-size: 90%;">' + esc(c.latestCommitDate) + '</td>'
    };
    const detailsCol = {
        key: 'details', label: 'details', type: 'string', dir: 1, sortable: false, headerStyle: 'text-align: center;',
        value: c => '',
        cell: c => '<td style="text-align: center;"><a target="_blank" title="details" href="' + esc(c.reportUrl) + '">' + DETAILS_ICON + '</a></td>'
    };

    function commitsCol(key, label, accessor, withPct, dim) {
        return {
            key: key, label: label, type: 'number', dir: -1, headerStyle: 'text-align: center;',
            value: accessor,
            cell: (c, total) => commitsCell(accessor(c), total, withPct, dim)
        };
    }
    function reposCol(label, accessor) {
        return {
            key: 'repos', label: label, type: 'number', dir: -1, headerStyle: 'text-align: center;',
            value: accessor,
            cell: c => '<td style="vertical-align: middle; text-align: center; font-size: 90%;">' + num(accessor(c)) + '</td>'
        };
    }

    // Tab definitions. "recent" leads with 30d commits; "all" leads with all-time.
    const TABS = [];

    TABS.push({
        id: 'recent', label: 'Recently Active (30d)', list: groups.recent || [], sortKey: 'commits30', sortDir: -1,
        totalKey: 'commitsCount30Days',
        links: [
            {label: 'bubble chart', href: 'visuals/bubble_chart_contributors_30_days.html'},
            {label: 'tree map', href: 'visuals/tree_map_contributors_30_days.html'}
        ],
        columns: [
            langCol, nameCol,
            commitsCol('commits30', '# commits<br>30 days', c => c.commitsCount30Days, true, false),
            commitsCol('commits90', '# commits<br>90 days', c => c.commitsCount90Days, false, false),
            commitsCol('commits365', '# commits<br>past year', c => c.commitsCount365Days, false, false),
            commitsCol('commitsAll', '# commits<br>all time', c => c.commitsCount, false, false),
            firstCol, latestCol,
            reposCol('repositories<br>(30d)', c => c.repositoriesCount30Days),
            detailsCol
        ]
    });

    TABS.push({
        id: 'all', label: 'All Time', list: groups.all || [], sortKey: 'commitsAll', sortDir: -1,
        totalKey: 'commitsCount',
        links: [
            {label: 'bubble chart', href: 'visuals/bubble_chart_contributors.html'},
            {label: 'tree map', href: 'visuals/tree_map_contributors.html'},
            {label: 'txt', href: 'data/contributors.txt'},
            {label: 'json', href: 'data/contributors.json'},
            {label: 'animated history (all time)', href: 'visuals/racing_charts_commits_contributors.html?tickDuration=600'},
            {label: 'animated history (12 months window)', href: 'visuals/racing_charts_commits_window_contributors.html?tickDuration=600'}
        ],
        columns: [
            langCol, nameCol,
            commitsCol('commitsAll', '# commits<br>all time', c => c.commitsCount, true, false),
            commitsCol('commits365', '# commits<br>past year', c => c.commitsCount365Days, false, false),
            commitsCol('commits90', '# commits<br>90 days', c => c.commitsCount90Days, false, false),
            commitsCol('commits30', '# commits<br>30 days', c => c.commitsCount30Days, false, false),
            firstCol, latestCol,
            reposCol('repositories', c => c.repositoriesCount),
            detailsCol
        ]
    });

    if (options.showBots && (groups.bots || []).length) {
        TABS.push({
            id: 'bots', label: 'Bots', list: groups.bots || [], sortKey: 'commitsAll', sortDir: -1,
            totalKey: 'commitsCount',
            links: [],
            columns: [
                langCol, nameCol,
                commitsCol('commitsAll', '# commits<br>all time', c => c.commitsCount, true, false),
                commitsCol('commits365', '# commits<br>past year', c => c.commitsCount365Days, false, false),
                commitsCol('commits90', '# commits<br>90 days', c => c.commitsCount90Days, false, false),
                commitsCol('commits30', '# commits<br>30 days', c => c.commitsCount30Days, false, false),
                firstCol, latestCol,
                reposCol('repositories', c => c.repositoriesCount),
                detailsCol
            ]
        });
    }

    const TABS_BY_ID = {};
    TABS.forEach(t => TABS_BY_ID[t.id] = t);

    // Optional ?tab=<id> selects the initial tab (used when embedded as an iframe).
    function initialTab() {
        const m = location.search.match(/[?&]tab=([^&]+)/);
        const requested = m ? decodeURIComponent(m[1]) : null;
        if (requested && TABS_BY_ID[requested]) {
            return requested;
        }
        return TABS.length ? TABS[0].id : 'recent';
    }

    let activeTab = initialTab();

    // ---- sorting -------------------------------------------------------------

    function makeComparator(column, dir) {
        return (a, b) => {
            const va = column.value(a);
            const vb = column.value(b);
            let cmp;
            if (column.type === 'string') {
                cmp = String(va == null ? '' : va).localeCompare(String(vb == null ? '' : vb));
            } else {
                cmp = (va < vb) ? -1 : (va > vb ? 1 : 0);
            }
            return cmp * dir;
        };
    }

    function sortHeader(tab, column) {
        const active = tab.sortKey === column.key;
        const arrow = active ? (tab.sortDir === 1 ? ' ▲' : ' ▼') : '';
        const cls = 'sortable' + (active ? ' sort-active' : '');
        return '<th class="' + cls + '" style="' + (column.headerStyle || '') + '" onclick="sortBy(\'' + tab.id + '\', \'' + column.key + '\')">'
            + column.label + '<span class="sort-arrow">' + arrow + '</span></th>';
    }

    function sortBy(tabId, key) {
        const tab = TABS_BY_ID[tabId];
        const column = tab.columns.find(c => c.key === key);
        if (!column) {
            return;
        }
        if (tab.sortKey === key) {
            tab.sortDir = -tab.sortDir;
        } else {
            tab.sortKey = key;
            tab.sortDir = column.dir;
        }
        render();
    }

    // ---- paging --------------------------------------------------------------

    const PAGE_SIZE = 250;
    let displayLimit = PAGE_SIZE;

    function showMore() {
        displayLimit += PAGE_SIZE;
        render(true);
    }

    function showMoreFooter(shownCount, totalCount) {
        if (totalCount <= shownCount) {
            return '';
        }
        return '<div style="margin: 16px 2px; font-size: 15px; color: #555;">'
            + 'Showing ' + num(shownCount) + ' of ' + num(totalCount) + '. '
            + '<a onclick="showMore()" style="cursor: pointer; color: #4a90d9;">show ' + num(Math.min(PAGE_SIZE, totalCount - shownCount)) + ' more</a>'
            + '</div>';
    }

    // ---- tabs / rendering ----------------------------------------------------

    function buildTabs() {
        let html = '';
        TABS.forEach(tab => {
            html += '<button class="' + (tab.id === activeTab ? 'active' : '') + '" onclick="selectTab(\'' + tab.id + '\')">' + tab.label + '</button>';
        });
        document.getElementById('tabs').innerHTML = html;
    }

    function selectTab(id) {
        activeTab = id;
        buildTabs();
        render();
    }

    // A search can contain several terms separated by ";"; the result is the UNION of the
    // individual term matches (search "a;b" returns matches of "a" plus matches of "b").
    // Plain terms search only the contributor name; a term prefixed with "team:" searches
    // only the team name (matching the text after the prefix).
    function getFilters() {
        const terms = document.getElementById('filter').value.toLowerCase().trim()
            .split(';').map(s => s.trim()).filter(s => s.length);
        const nameFilters = [];
        const teamFilters = [];
        terms.forEach(t => {
            if (t.startsWith('team:')) {
                const teamTerm = t.substring('team:'.length).trim();
                if (teamTerm.length) {
                    teamFilters.push(teamTerm);
                }
            } else {
                nameFilters.push(t);
            }
        });
        return { nameFilters, teamFilters };
    }

    function matchesFilters(text, filters) {
        if (!filters.length) {
            return false;
        }
        if (!text) {
            return false;
        }
        const lower = text.toLowerCase();
        return filters.some(f => lower.includes(f));
    }

    function tabLinksHtml(links) {
        if (!links || !links.length) {
            return '';
        }
        const items = links.map(l => '<a href="' + esc(l.href) + '" target="_blank" style="color: #4a90d9;">' + esc(l.label) + '</a>')
            .join('<span style="color: #ccc;"> | </span>');
        return '<div style="margin: 4px 0 10px 0; font-size: 90%;">' + items + '</div>';
    }

    function render(keepPaging) {
        if (!keepPaging) {
            displayLimit = PAGE_SIZE;
        }
        const { nameFilters, teamFilters } = getFilters();
        const noFilters = !nameFilters.length && !teamFilters.length;
        const tab = TABS_BY_ID[activeTab];

        let rows = (tab.list || []).filter(c => noFilters
            || matchesFilters(c.email, nameFilters)
            || matchesFilters(c.team, teamFilters));
        const column = tab.columns.find(c => c.key === tab.sortKey) || tab.columns[0];
        rows = rows.slice().sort(makeComparator(column, tab.sortDir));

        const totalCommits = rows.reduce((a, b) => a + (b[tab.totalKey] || 0), 0);
        document.getElementById('search-summary').innerHTML = '= ' + num(rows.length) + ' '
            + (rows.length === 1 ? 'contributor' : 'contributors')
            + ' (' + num(totalCommits) + ' commits)';

        let html = tabLinksHtml(tab.links);
        html += '<table style="width: 100%"><thead><tr>';
        tab.columns.forEach(col => {
            if (col.sortable === false) {
                html += '<th style="' + (col.headerStyle || '') + '">' + col.label + '</th>';
            } else {
                html += sortHeader(tab, col);
            }
        });
        html += '</tr></thead><tbody>';
        const shown = rows.slice(0, displayLimit);
        shown.forEach(c => {
            const weight = c.commitsCount30Days > 0 ? 'font-weight: bold;' : (c.commitsCount90Days > 0 ? '' : 'color: lightgrey;');
            html += '<tr style="' + weight + '">';
            tab.columns.forEach(col => html += col.cell(c, totalCommits));
            html += '</tr>';
        });
        html += '</tbody></table>';
        html += showMoreFooter(shown.length, rows.length);
        document.getElementById('content').innerHTML = html;
    }

    buildTabs();
    render();
</script>
</body>
</html>
